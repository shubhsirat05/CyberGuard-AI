version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: cyberguard-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cyberguard-net

  server:
    build: ./server
    container_name: cyberguard-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/cyberguard
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - mongodb
    networks:
      - cyberguard-net
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        - REACT_APP_API_URL=http://localhost:5000/api
    container_name: cyberguard-client
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - cyberguard-net
    restart: unless-stopped

networks:
  cyberguard-net:
    driver: bridge

volumes:
  mongo_data:
